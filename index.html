<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考试粥助手</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
    html.dark, html.dark body {
      background-color: #0f172a !important;
      color: #ffffff;
    }
    html.light, html.light body {
      background-color: #f7f5f0 !important;
      color: #1c1814;
    }
    #root:empty::after {
      content: '加载中...';
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 18px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #94a3b8;
    }
    #load-error {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0f172a;
      color: #f8fafc;
      font-family: monospace;
      padding: 2rem;
      overflow: auto;
      z-index: 9999;
    }
    #load-error h2 { color: #f87171; margin-bottom: 8px; }
    #load-error pre { white-space: pre-wrap; word-break: break-all; font-size: 13px; opacity: 0.8; }
  </style>
  <script>
    // 全局错误捕获 — 在 React 加载前/后都生效
    window.__errors = [];
    window.addEventListener('error', function(e) {
      var detail = e.message || (e.target && e.target.src ? '资源加载失败: ' + e.target.src : '');
      window.__errors.push({ time: new Date().toISOString(), type: 'error', message: detail, filename: e.filename, lineno: e.lineno });
      showError(detail);
    });
    window.addEventListener('unhandledrejection', function(e) {
      window.__errors.push({ time: new Date().toISOString(), type: 'unhandledrejection', message: String(e.reason) });
      showError(String(e.reason));
    });
    function showError(msg) {
      var el = document.getElementById('load-error');
      if (el) {
        el.style.display = 'block';
        var pre = el.querySelector('pre');
        if (pre) pre.textContent += '\n' + msg;
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <div id="load-error">
    <h2>⚠️ 应用加载异常</h2>
    <p>请将以下错误信息反馈给开发者：</p>
    <pre></pre>
    <p style="margin-top:16px;opacity:0.6;">提示：可按 <kbd>F12</kbd> 打开开发者工具查看详细错误</p>
  </div>
</body>
</html>
